services:
  - type: web
    name: hintro
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run db:migrate:deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: SLACK_WEBHOOK_URL
        sync: false
